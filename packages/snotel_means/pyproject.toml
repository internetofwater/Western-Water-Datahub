[project]
name = "snotel_means"
version = "0.1.0"
description = "Calculate the basin index percentage (also known as the percent normal) of Snow Water Equivalent (SWE) for each HUC06 basin based on the values from all SNOTEL stations within that basin"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[tool.uv]
package = true

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["snotel_means"]

[tool.hatch.metadata]
allow-direct-references = true
